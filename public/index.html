<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatVatican RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="app-shell">
      <section class="header-card reveal">
        <div class="header-topline">
          <div>
            <p class="eyebrow">RAG Console</p>
            <h1>ChatVatican</h1>
            <p class="subtitle">Interroga documenti ecclesiali con retrieval + risposta strutturata.</p>
          </div>

          <div class="role-switch" aria-label="Selettore vista">
            <button id="userModeBtn" class="role-switch-btn" type="button" data-ui-mode="user" aria-pressed="false">
              Utente
            </button>
            <button id="adminModeBtn" class="role-switch-btn" type="button" data-ui-mode="admin" aria-pressed="true">
              Admin
            </button>
          </div>
        </div>
        <p id="stateStatus" class="status-line admin-only">Stato locale: in caricamento...</p>
      </section>

      <section class="controls-card reveal-delay-1 admin-only">
        <label>
          Limite risultati
          <input id="limit" type="number" min="1" max="20" value="5" />
        </label>

        <label>
          Modello Ollama
          <input id="model" type="text" value="gemma:7b" />
        </label>

        <label>
          Modalita' chat
          <select id="chatMode">
            <option value="agent" selected>Agente (raccolta dati)</option>
            <option value="rag">Ricerca RAG</option>
          </select>
        </label>

        <label id="promptTemplateBlock" class="full-width">
          Prompt template (usa {{context}} e {{question}})
          <textarea id="promptTemplate" rows="12">Usa solo il contesto seguente.

Contesto:
{{context}}

Domanda:
{{question}}

Scrivi la risposta con questa struttura:

Sintesi iniziale:
[3-4 frasi]

Passaggi logici:
1. ...
2. ...
3. ...

Temi principali:
- ...
- ...
- ...

Evidenze dal contesto:
- [fatto] (fonte, data)
- [fatto] (fonte, data)

Fonti:
- ...

Conclusione:
[2-3 frasi]

Regole:
- non usare conoscenze esterne
- non inventare fatti
- usa solo il contesto fornito</textarea>
        </label>

        <label id="agentPromptTemplateBlock" class="full-width">
          Prompt agente raccolta dati (usa {{question}}, {{history}}, {{strictTemporal}})
          <textarea id="agentPromptTemplate" rows="8">Classifica l'intento di una richiesta utente per preparare ricerca documentale.
Restituisci SOLO JSON valido con schema:
{"needsTopic":boolean,"needsTime":boolean,"isTimeSensitive":boolean,"confidence":number}

Regole:
- needsTopic=true se il tema richiesto e' troppo vago
- needsTime=true se manca un riferimento temporale essenziale
- isTimeSensitive=true se il tipo di domanda dipende dal tempo (eventi, nomine, ordinazioni, aggiornamenti)
- confidence tra 0 e 1
- niente testo extra

Modalita' strictTemporal: {{strictTemporal}}
Storico utente:
{{history}}

Ultima domanda utente:
{{question}}</textarea>
        </label>
      </section>

      <section id="debugPanel" class="debug-card reveal-delay-2 admin-only" style="display:none">
        <details>
          <summary class="debug-summary"><span id="debugSummaryText">Debug ricerca</span></summary>
          <div id="debugContent" class="debug-content"></div>
        </details>
      </section>

      <section class="chat-card reveal-delay-2">
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <textarea
            id="question"
            rows="3"
            placeholder="Scrivi una domanda, ad esempio: Che cosa emerge da questi articoli su Papa Leone XIV?"
            required
          ></textarea>
          <p id="searchStatus" class="status-line admin-only">Ricerca contesto: inattiva</p>
          <button id="sendBtn" type="submit">Invia</button>
        </form>
      </section>
    </main>

    <template id="messageTemplate">
      <article class="message">
        <p class="role"></p>
        <div class="content"></div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script type="module" src="app-notizie.js"></script>
  </body>
</html>
