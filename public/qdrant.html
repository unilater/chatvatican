<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ricerca Ecclesiale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="stylesheet" href="search-styles.css" />
</head>
<body>
<div id="app">

  <!-- ── HEADER ── -->
  <header id="topbar">
    <a href="#" class="logo">Ricerca Ecclesiale</a>

    <div class="topbar-controls">
      <!-- Role switch -->
      <div class="role-switch" aria-label="Modalità vista">
        <button id="userModeBtn"  class="role-switch-btn" type="button" data-role="user"  aria-pressed="true">Utente</button>
        <button id="adminModeBtn" class="role-switch-btn" type="button" data-role="admin" aria-pressed="false">Admin</button>
      </div>
    </div>
  </header>

  <!-- ── CONTENT ROW ── -->
  <div id="content-row">

  <!-- ── SIDEBAR ── -->
  <aside id="sidebar" class="hidden">
    <div class="sidebar-header">Fonti trovate</div>
    <div id="sidebar-filters"></div>
    <div id="sidebar-sources"></div>
  </aside>

  <!-- ── MAIN COLUMN ── -->
  <div id="main-col">

  <!-- ── CHAT AREA ── -->
  <main id="chat-area">
    <!-- Welcome -->
    <div id="welcome">
      <h1>Ricerca Ecclesiale</h1>
      <p>Ricerca semantica nei documenti vaticani ed ecclesiali</p>
    </div>

    <!-- Messages -->
    <div id="messages"></div>
  </main>

  <!-- ── ADMIN PANEL ── -->
  <div id="admin-panel" class="hidden">
    <div class="admin-panel-inner">

      <!-- Riga 1: Collection + Modello + Fonti -->
      <div class="admin-row">
        <div class="admin-field">
          <label class="admin-label" for="collection-select">Collection</label>
          <select id="collection-select" class="select-pill" aria-label="Collection Qdrant"></select>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="model-select">Modello AI</label>
          <select id="model-select" class="select-pill" aria-label="Modello AI"></select>
        </div>
        <div class="admin-field">
          <label class="admin-label" for="source-limit">Fonti per risposta</label>
          <select id="source-limit" class="select-pill" aria-label="Numero fonti">
            <option value="3">3</option>
            <option value="5">5</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="16" selected>16</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="50">50</option>
          </select>
        </div>
        <div class="admin-field admin-field-actions">
          <span id="save-status" class="save-status"></span>
          <button id="reset-prompt-btn" class="btn-admin" type="button">Reset prompt</button>
          <button id="save-prompt-btn"  class="btn-admin primary" type="button">Salva</button>
        </div>
      </div>

      <!-- Riga 2: Prompt -->
      <div class="admin-prompt-label">Prompt RAG <span class="admin-panel-hint">variabili: <code>{{question}}</code> <code>{{context}}</code></span></div>
      <textarea id="system-prompt" class="prompt-editor" rows="4"
        placeholder="Lascia vuoto per nessun prompt.&#10;Esempio: Sei un esperto di documenti vaticani.&#10;&#10;DOMANDA: {{question}}&#10;&#10;FONTI:&#10;{{context}}"></textarea>

    </div>
  </div><!-- /#admin-panel -->

  </div><!-- /#main-col -->
  </div><!-- /#content-row -->

  <!-- ── INPUT FOOTER ── -->
  <footer id="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <textarea
          id="query-input"
          placeholder="Poni una domanda sui documenti ecclesiali…"
          rows="1"
          aria-label="Testo della ricerca"
        ></textarea>
        <button id="send-btn" type="button" title="Invia" aria-label="Invia">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Ricerca semantica nei documenti ecclesiali e vaticani</p>
    </div>
  </footer>

</div><!-- /#app -->

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<script src="qdrant-app.js" type="module"></script>
</body>
</html>
