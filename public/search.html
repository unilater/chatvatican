<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio Cristiano — Ricerca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- instantsearch.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4/dist/instantsearch.production.min.js"></script>
    <link rel="stylesheet" href="search-styles.css" />
  </head>
  <body>
    <div id="app">

      <!-- ═══════════════════════════════════════════════════════════
           TOP BAR
      ═══════════════════════════════════════════════════════════ -->
      <header class="topbar">
        <div class="topbar-row">
          <a href="/" class="logo" title="Torna alla chat">
            <svg class="logo-cross" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M9 2v14M3 7h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span>Archivio Cristiano</span>
          </a>

          <div class="topbar-right">
            <!-- Selettore archivio -->
            <select id="index-select" class="select-pill" title="Archivio">
              <option value="testi_ecclesiali">Testi Ecclesiali</option>
              <option value="bollettino">Bollettino</option>
            </select>

            <!-- Selettore modello AI -->
            <div class="model-picker">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
                <rect x="1" y="1" width="11" height="11" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
                <path d="M4 6.5h5M6.5 4v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <select id="model-select" class="select-pill" title="Modello AI">
                <option value="">Caricamento modelli...</option>
              </select>
            </div>

            <!-- Switch utente / admin -->
            <div class="role-switch" aria-label="Modalità vista">
              <button id="userModeBtn" class="role-switch-btn" type="button" data-role="user" aria-pressed="true">Utente</button>
              <button id="adminModeBtn" class="role-switch-btn" type="button" data-role="admin" aria-pressed="false">Admin</button>
            </div>
          </div>
        </div>

        <div class="search-row">
          <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">
              <svg width="17" height="17" viewBox="0 0 15 15" fill="none">
                <circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.5"/>
                <path d="M9.5 9.5l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            <!-- Instantsearch SearchBox viene montato qui -->
            <div id="searchbox"></div>
          </div>
        </div>

        <!-- Filtri dinamici nell'header — visibili dopo la ricerca -->
        <div id="dynamic-filters" class="dynamic-filters hidden" aria-live="polite">
          <div id="filter-groups" class="filter-groups"></div>
          <button id="clear-filters-btn" type="button" class="clear-filters-btn hidden">✕ Reset</button>
        </div>
      </header>

      <!-- ═══════════════════════════════════════════════════════════
           CORPO SPLIT
      ═══════════════════════════════════════════════════════════ -->
      <div class="split-body">

        <!-- ── Colonna sinistra: risultati ── -->
        <aside class="col-results">

          <!-- Stats + sort -->
          <div id="results-bar" class="results-bar hidden">
            <div id="stats"></div>
            <div class="sort-wrap">
              <select id="sort-select" class="select-mini">
                <option value="">Rilevanza</option>
                <option value="data:desc">Più recente</option>
                <option value="data:asc">Più vecchia</option>
              </select>
            </div>
          </div>

          <!-- Hits (popolati da InstantSearch) -->
          <div id="hits" class="hits-list" aria-live="polite"></div>

          <!-- Paginazione instantsearch -->
          <div id="pagination" class="pagination-wrap"></div>
        </aside>

        <!-- ── Colonna destra: risposta AI ── -->
        <main class="col-chat">

          <!-- Stato iniziale / welcome -->
          <div id="chat-welcome" class="chat-welcome">
            <svg class="welcome-cross" width="52" height="52" viewBox="0 0 52 52" fill="none" aria-hidden="true">
              <path d="M26 5v42M8 18h36" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <h2>Cerca un documento</h2>
            <p>I risultati appaiono a sinistra in tempo reale.<br>L'analisi AI si avvia automaticamente.</p>
            <div class="hint-chips" id="hint-chips"></div>
          </div>

          <!-- Area risposta + fonti -->
          <div id="chat-panel" class="chat-panel hidden">
            <div class="chat-query-label">
              <span class="chip-query" id="chat-query-label"></span>
            </div>

            <!-- Risposta streaming -->
            <div id="chat-answer" class="chat-answer" aria-live="polite"></div>

            <!-- Indicatore caricamento -->
            <div id="chat-loading" class="chat-loading hidden">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>

            <!-- Fonti citate -->
            <div id="chat-sources" class="chat-sources hidden">
              <p class="sources-label">Fonti</p>
              <div id="sources-list" class="sources-list"></div>
            </div>
          </div>

        </main>
      </div>
    </div><!-- /#app -->

    <!-- ADMIN BAR — fixed in fondo al viewport, visibile solo in modalità admin -->
    <div id="admin-bar" class="admin-bar hidden">
      <div class="admin-bar-inner">
        <div class="admin-bar-header">
          <span class="admin-bar-title">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true" style="vertical-align:-1px">
              <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.3"/>
              <path d="M6.5 4v3l2 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Prompt RAG
          </span>
          <span class="admin-bar-hint">Variabili: <code>{{query}}</code> e <code>{{context}}</code> — lascia vuoto per il prompt predefinito</span>
          <div class="admin-bar-actions">
            <span id="save-prompt-status" class="save-status"></span>
            <button id="reset-prompt-btn" class="btn-reset-prompt" type="button" title="Ripristina default">Reset</button>
            <button id="save-prompt-btn" class="btn-save-prompt" type="button">Salva</button>
          </div>
        </div>
        <textarea id="system-prompt" class="prompt-editor" rows="5"
          placeholder="Lascia vuoto per usare il prompt predefinito. Esempio:&#10;Sei un esperto di documenti cristiani.&#10;Rispondi in italiano usando SOLO le fonti.&#10;Cita con [1], [2].&#10;&#10;DOMANDA: {{query}}&#10;&#10;FONTI:&#10;{{context}}"></textarea>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="search-app.js" type="module"></script>
  </body>
</html>
